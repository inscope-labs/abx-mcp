name: Build Signed Release AAB

on:
  workflow_dispatch:   # manual trigger only — never runs automatically

jobs:
  release:
    name: Build & Sign AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify signing secrets are present
        run: |
          missing=0
          [ -z "${{ secrets.KEYSTORE_BASE64 }}" ] && echo "::error::KEYSTORE_BASE64 secret is not set" && missing=1
          [ -z "${{ secrets.STORE_PASSWORD }}" ] && echo "::error::STORE_PASSWORD secret is not set" && missing=1
          [ -z "${{ secrets.KEY_PASSWORD }}" ] && echo "::error::KEY_PASSWORD secret is not set" && missing=1
          if [ "$missing" = "1" ]; then
            echo "::error::One or more release signing secrets are missing. Refusing to build an unsigned or wrongly-signed release artifact. Add the missing secret(s) under Settings > Secrets and variables > Actions, then re-run."
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.6.1"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > upload-key.jks

      - name: Verify decoded keystore is valid
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          keytool -list -keystore upload-key.jks -storepass "$STORE_PASSWORD" -alias upload || {
            echo "::error::Decoded keystore failed to open with the provided STORE_PASSWORD/alias 'upload'. Check that KEYSTORE_BASE64 was encoded correctly (base64 -w0) and that the alias matches."
            rm -f upload-key.jks
            exit 1
          }

      - name: Build signed release bundle
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/upload-key.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle :app:bundleRelease

      - name: Verify output AAB is actually signed
        run: |
          AAB=app/build/outputs/bundle/release/app-release.aab
          if [ ! -f "$AAB" ]; then
            echo "::error::Expected AAB not found at $AAB — build did not produce a release artifact."
            exit 1
          fi
          jarsigner -verify "$AAB" || {
            echo "::error::Output AAB is not properly signed. Do not upload this artifact."
            exit 1
          }
          echo "AAB built and signature verified: $AAB"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Clean up keystore
        if: always()
        run: rm -f upload-key.jks
