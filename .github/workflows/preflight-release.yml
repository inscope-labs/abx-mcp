name: Preflight Release Verification

on:
  workflow_call:
  workflow_dispatch:

jobs:
  preflight:
    name: Preflight Release Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.6.1"

      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > upload-key.jks

      - name: Build release bundle
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/upload-key.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle :app:bundleRelease

      - name: Run Release Artifact Verification Script
        run: |
          chmod +x tools/verify-release-artifact.sh
          # Download bundletool.jar for the verification script
          curl -L -o bundletool.jar https://github.com/google/bundletool/releases/download/1.15.6/bundletool-all-1.15.6.jar
          ./tools/verify-release-artifact.sh app/build/outputs/bundle/release/app-release.aab

      - name: Upload verify report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preflight-verify-report
          path: app/build/outputs/bundle/release/verify-report.json

      - name: Clean up keystore
        if: always()
        run: rm -f upload-key.jks
