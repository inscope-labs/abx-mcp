name: CI Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # No committed Gradle wrapper (built virtually via AI Studio, no local
      # shell to run `gradle wrapper`). This action downloads/caches the
      # correct Gradle version instead of relying on ./gradlew.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.6.1"    # was "8.13" — AGP 9.1.1 requires Gradle >=9.1.0

      - name: Run Unit Tests
        run: gradle test

      # connectedAndroidTest is intentionally NOT run here. Instrumented
      # tests are verified manually via AI Studio's built-in emulator during
      # development. Re-introduce this step deliberately (with
      # reactivecircus/android-emulator-runner or similar, since GitHub-hosted
      # Linux runners have no attached device) if/when instrumented CI
      # coverage becomes required by a later phase.
