name: Preflight Diagnostic (Minimal)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnostic:
    name: Minimal Scaffolding Diagnostic
    runs-on: ubuntu-latest
    environment: ENV_ABX_MCP
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.6.1"

      - name: Decode keystore (non-fatal)
        shell: bash
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
            echo "Keystore decoded to $RUNNER_TEMP/release.jks"
          else
            echo "KEYSTORE_BASE64 not set — skipping decode."
            echo "Build is expected to fail at signing; that failure itself is useful diagnostic information, not an error in this workflow."
          fi

      - name: Build release AAB (diagnostic, captured)
        id: build
        shell: bash
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set +e
          gradle :app:bundleRelease --no-daemon 2>&1 | tee "$RUNNER_TEMP/gradle-build.log"
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e
          echo "BUILD_EXIT=$BUILD_EXIT" >> "$GITHUB_ENV"

      - name: Run diagnostic and write log
        shell: bash
        run: |
          mkdir -p diagnostics/preflight-minimal
          TS="$(date -u +%Y%m%dT%H%M%SZ)"
          LOGFILE="diagnostics/preflight-minimal/run-${{ github.run_number }}-${TS}.log"

          {
            echo "Preflight Minimal Diagnostic"
            echo "Run number: ${{ github.run_number }}"
            echo "Run ID: ${{ github.run_id }}"
            echo "Triggered (UTC): $(date -u)"
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Ref: $GITHUB_REF"
            echo "Runner: $(uname -a)"
            echo ""
            echo "--- Secret presence (booleans only, values never printed) ---"
            if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
              echo "KEYSTORE_BASE64: present"
            else
              echo "KEYSTORE_BASE64: MISSING"
            fi
            if [ -n "${{ secrets.STORE_PASSWORD }}" ]; then
              echo "STORE_PASSWORD: present"
            else
              echo "STORE_PASSWORD: MISSING"
            fi
            if [ -n "${{ secrets.KEY_PASSWORD }}" ]; then
              echo "KEY_PASSWORD: present"
            else
              echo "KEY_PASSWORD: MISSING"
            fi
            echo ""
            echo "--- Android SDK environment (informational only, not exercised) ---"
            echo "ANDROID_SDK_ROOT: ${ANDROID_SDK_ROOT:-<unset>}"
            echo "ANDROID_HOME: ${ANDROID_HOME:-<unset>}"
            echo ""
            echo "Diagnostic completed at $(date -u), no build or validation attempted."
          } | tee "$LOGFILE"

          echo "" >> "$LOGFILE"
          echo "--- Build result ---" >> "$LOGFILE"
          echo "Gradle exit code: ${BUILD_EXIT:-<not run>}" >> "$LOGFILE"
          AAB="app/build/outputs/bundle/release/app-release.aab"
          if [ "${BUILD_EXIT:-1}" = "0" ] && [ -f "$AAB" ]; then
            echo "AAB produced: $AAB" >> "$LOGFILE"
            echo "AAB size (bytes): $(stat -c%s "$AAB")" >> "$LOGFILE"
            echo "AAB sha256: $(sha256sum "$AAB" | awk '{print $1}')" >> "$LOGFILE"
          else
            echo "AAB NOT produced (build failed or was skipped)." >> "$LOGFILE"
          fi
          echo "" >> "$LOGFILE"
          echo "--- Android SDK (informational only, no validation performed) ---" >> "$LOGFILE"
          echo "ANDROID_SDK_ROOT: ${ANDROID_SDK_ROOT:-<unset>}" >> "$LOGFILE"
          if [ -n "$ANDROID_SDK_ROOT" ] && [ -d "$ANDROID_SDK_ROOT/build-tools" ]; then
            echo "Installed build-tools versions:" >> "$LOGFILE"
            ls -1 "$ANDROID_SDK_ROOT/build-tools" >> "$LOGFILE"
          fi
          echo "" >> "$LOGFILE"
          echo "--- Gradle build log (last 150 lines) ---" >> "$LOGFILE"
          tail -n 150 "$RUNNER_TEMP/gradle-build.log" >> "$LOGFILE" 2>/dev/null || echo "gradle log not found" >> "$LOGFILE"

          echo "LOGFILE_PATH=$LOGFILE" >> "$GITHUB_ENV"

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          echo "## Preflight Minimal Diagnostic" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat "$LOGFILE_PATH" >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "log file not found" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and push diagnostic log
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add diagnostics/preflight-minimal/
          git commit -m "chore(diagnostics): preflight minimal run ${{ github.run_number }}" || echo "nothing to commit"
          git push

      - name: Upload log as artifact (redundant safety net)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preflight-minimal-log-${{ github.run_number }}
          path: diagnostics/preflight-minimal/
          retention-days: 14

      - name: Upload AAB as artifact (if produced)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preflight-diagnostic-aab-${{ github.run_number }}
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: warn
          retention-days: 14
